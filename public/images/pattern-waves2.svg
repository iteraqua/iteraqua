<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
  <defs>
    <!-- Gradients for depth and layering -->
    <linearGradient id="ocean-back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    
    <linearGradient id="ocean-mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="ocean-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Background base to prevent sub-pixel gaps at the bottom -->
  <rect width="1440" height="320" fill="#0f172a"/>

  <!-- Back Wave (Slowest, Darkest) -->
  <path fill="url(#ocean-back)" opacity="0.6">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0.05 0.55 0.95;0.45 0.05 0.55 0.95"
      values="
        M0,210 C240,250 480,170 720,220 C960,270 1200,180 1440,220 L1440,320 L0,320 Z;
        M0,230 C240,180 480,260 720,200 C960,150 1200,250 1440,210 L1440,320 L0,320 Z;
        M0,210 C240,250 480,170 720,220 C960,270 1200,180 1440,220 L1440,320 L0,320 Z"/>
  </path>

  <!-- Mid Wave (Original Speed, Original Colors) -->
  <path fill="url(#ocean-mid)" opacity="0.8">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0.05 0.55 0.95;0.45 0.05 0.55 0.95"
      values="
        M0,180 C240,230 480,140 720,190 C960,240 1200,150 1440,190 L1440,320 L0,320 Z;
        M0,200 C240,150 480,230 720,170 C960,120 1200,220 1440,180 L1440,320 L0,320 Z;
        M0,180 C240,230 480,140 720,190 C960,240 1200,150 1440,190 L1440,320 L0,320 Z"/>
  </path>

  <!-- Front Wave (Fastest, Lightest/Translucent) -->
  <path fill="url(#ocean-front)" opacity="0.4">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0.05 0.55 0.95;0.45 0.05 0.55 0.95"
      values="
        M0,240 C240,280 480,200 720,250 C960,290 1200,220 1440,250 L1440,320 L0,320 Z;
        M0,250 C240,210 480,290 720,240 C960,200 1200,280 1440,240 L1440,320 L0,320 Z;
        M0,240 C240,280 480,200 720,250 C960,290 1200,220 1440,250 L1440,320 L0,320 Z"/>
  </path>
</svg>
